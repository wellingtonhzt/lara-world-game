<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lara World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🌍 Lara World</h1>
      <span id="world-indicator" class="hidden">🌿 Mundo da Floresta</span>
    </header>

    <div id="setup-screen" class="setup-screen hidden">
      <div class="setup-content">
        <h2>🚀 Preparar Jogo</h2>
        <div class="setup-players">
          <div class="setup-player-card">
            <h3>👶 Jogador 1</h3>
            <label for="player1-name">Nome:</label>
            <input type="text" id="player1-name" value="Lara" maxlength="20">
            <label>Sprite:</label>
            <div class="emoji-grid" id="p1-emoji-grid">
              <button class="emoji-btn" data-emoji="🧒">🧒</button>
              <button class="emoji-btn" data-emoji="🌟">🌟</button>
              <button class="emoji-btn" data-emoji="🌸">🌸</button>
              <button class="emoji-btn" data-emoji="🌈">🌈</button>
              <button class="emoji-btn" data-emoji="⭐">⭐</button>
              <button class="emoji-btn" data-emoji="🦋">🦋</button>
              <button class="emoji-btn" data-emoji="🍀">🍀</button>
              <button class="emoji-btn" data-emoji="🎈">🎈</button>
              <button class="emoji-btn" data-emoji="🐱">🐱</button>
              <button class="emoji-btn" data-emoji="🍭">🍭</button>
              <button class="emoji-btn" data-emoji="🎀">🎀</button>
              <button class="emoji-btn" data-emoji="🌻">🌻</button>
              <button class="emoji-btn" data-emoji="🐰">🐰</button>
              <button class="emoji-btn" data-emoji="🍬">🍬</button>
              <button class="emoji-btn" data-emoji="🦄">🦄</button>
              <button class="emoji-btn" data-emoji="🎪">🎪</button>
              <button class="emoji-btn" data-emoji="🐼">🐼</button>
              <button class="emoji-btn" data-emoji="🍉">🍉</button>
              <button class="emoji-btn" data-emoji="🐶">🐶</button>
              <button class="emoji-btn" data-emoji="🎠">🎠</button>
            </div>
          </div>
          <div class="setup-player-card">
            <h3>👥 Jogador 2</h3>
            <label for="player2-name">Nome:</label>
            <input type="text" id="player2-name" value="Amigo" maxlength="20">
            <label>Sprite:</label>
            <div class="emoji-grid" id="p2-emoji-grid">
              <button class="emoji-btn" data-emoji="🧑">🧑</button>
              <button class="emoji-btn" data-emoji="🌟">🌟</button>
              <button class="emoji-btn" data-emoji="🌸">🌸</button>
              <button class="emoji-btn" data-emoji="🌈">🌈</button>
              <button class="emoji-btn" data-emoji="⭐">⭐</button>
              <button class="emoji-btn" data-emoji="🦋">🦋</button>
              <button class="emoji-btn" data-emoji="🍀">🍀</button>
              <button class="emoji-btn" data-emoji="🎈">🎈</button>
              <button class="emoji-btn" data-emoji="🐱">🐱</button>
              <button class="emoji-btn" data-emoji="🍭">🍭</button>
              <button class="emoji-btn" data-emoji="🎀">🎀</button>
              <button class="emoji-btn" data-emoji="🌻">🌻</button>
              <button class="emoji-btn" data-emoji="🐰">🐰</button>
              <button class="emoji-btn" data-emoji="🍬">🍬</button>
              <button class="emoji-btn" data-emoji="🦄">🦄</button>
              <button class="emoji-btn" data-emoji="🎪">🎪</button>
              <button class="emoji-btn" data-emoji="🐼">🐼</button>
              <button class="emoji-btn" data-emoji="🍉">🍉</button>
              <button class="emoji-btn" data-emoji="🐶">🐶</button>
              <button class="emoji-btn" data-emoji="🎠">🎠</button>
            </div>
          </div>
        </div>
        <button id="start-game-btn" class="btn btn-primary" disabled>🎮 Iniciar Jogo</button>
      </div>
    </div>

    <div id="challenge-overlay" class="challenge-overlay hidden">
      <div class="challenge-content">
        <h2>❓ Desafio!</h2>
        <p id="challenge-question"></p>
        <div id="challenge-options"></div>
      </div>
    </div>

    <div id="portal-overlay" class="portal-overlay hidden">
      <div class="portal-content">
        <h2>🌿 Portal da Floresta</h2>
        <p id="portal-message">Você encontrou o Portal da Floresta!</p>
        <div class="portal-buttons">
          <button id="portal-entrar-btn" class="portal-btn portal-btn-entrar">🌲 Entrar</button>
          <button id="portal-continuar-btn" class="portal-btn portal-btn-continuar">➡️ Continuar</button>
        </div>
      </div>
    </div>

    <div id="victory-overlay" class="victory-overlay hidden">
      <div class="confetti-piece" style="left: 2%; background: #e91e63; animation-delay: 0s; width: 10px; height: 14px;"></div>
      <div class="confetti-piece" style="left: 10%; background: #ffd700; animation-delay: 0.3s; width: 6px; height: 10px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 18%; background: #7b1fa2; animation-delay: 0.6s; width: 8px; height: 12px;"></div>
      <div class="confetti-piece" style="left: 26%; background: #2196f3; animation-delay: 0.9s; width: 7px; height: 7px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 34%; background: #ff8f00; animation-delay: 1.2s; width: 9px; height: 13px;"></div>
      <div class="confetti-piece" style="left: 40%; background: #4caf50; animation-delay: 0.1s; width: 6px; height: 10px;"></div>
      <div class="confetti-piece" style="left: 48%; background: #e91e63; animation-delay: 0.5s; width: 8px; height: 8px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 56%; background: #ffd700; animation-delay: 0.8s; width: 10px; height: 14px;"></div>
      <div class="confetti-piece" style="left: 64%; background: #7b1fa2; animation-delay: 1.1s; width: 6px; height: 6px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 72%; background: #f44336; animation-delay: 1.4s; width: 8px; height: 12px;"></div>
      <div class="confetti-piece" style="left: 78%; background: #2196f3; animation-delay: 0.2s; width: 9px; height: 9px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 84%; background: #ff8f00; animation-delay: 0.7s; width: 7px; height: 11px;"></div>
      <div class="confetti-piece" style="left: 90%; background: #4caf50; animation-delay: 1.0s; width: 8px; height: 8px; border-radius: 50%;"></div>
      <div class="confetti-piece" style="left: 95%; background: #e91e63; animation-delay: 1.5s; width: 6px; height: 10px;"></div>
      <div class="confetti-piece" style="left: 46%; background: #ffd700; animation-delay: 0.4s; width: 11px; height: 15px;"></div>

      <div class="serpentine serpentine-1"></div>
      <div class="serpentine serpentine-2"></div>

      <div class="victory-content">
        <h2 id="victory-title"><span id="victory-trophy">🏆</span> Vitória!</h2>
        <p id="victory-message"></p>
        <button id="victory-play-again-btn" class="btn btn-primary">🔄 Jogar Novamente</button>
      </div>
    </div>

    <main class="game-layout">
      <section class="board-area">
        <div id="track-container">
          <div class="deco deco-cloud-1">☁️</div>
          <div class="deco deco-cloud-2">☁️</div>
          <div class="deco deco-cloud-3">☁️</div>
          <div class="deco deco-tree-1">🌳</div>
          <div class="deco deco-tree-2">🌲</div>
          <div class="deco deco-flower-1">🌷</div>
          <div class="deco deco-flower-2">🌻</div>
          <div class="deco deco-flower-3">🌸</div>
          <div class="deco deco-flower-4">🌺</div>
          <div class="deco deco-sun">🌤️</div>

          <div class="deco floresta-deco floresta-deco-tree-1">🌲</div>
          <div class="deco floresta-deco floresta-deco-tree-2">🌲</div>
          <div class="deco floresta-deco floresta-deco-tree-3">🌳</div>
          <div class="deco floresta-deco floresta-deco-mushroom-1">🍄</div>
          <div class="deco floresta-deco floresta-deco-mushroom-2">🍄</div>
          <div class="deco floresta-deco floresta-deco-leaf-1">🍃</div>
          <div class="deco floresta-deco floresta-deco-leaf-2">🍃</div>
          <div class="deco floresta-deco floresta-deco-flower">🌺</div>

          <svg class="path-line" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path id="trail-path" fill="none" stroke-linecap="round" stroke-linejoin="round" />
          </svg>

          <div id="track"></div>
          <div id="lara">🧒</div>
          <div id="lara-p2">🧑</div>
        </div>
      </section>

      <aside class="panel-area">
        <div class="panel-card">
          <h2>🎲 Dado</h2>
          <div class="dice-area">
            <div id="dice-display">🎲</div>
            <span id="dice-value">-</span>
          </div>
        </div>

        <div class="panel-card">
          <h2>📊 Status</h2>
          <p class="status-text turn-indicator">
            ➡️ <strong><span id="current-player-name">🧒 Lara</span></strong>
          </p>
          <p class="status-text pos-p1">
            <span id="p1-label">🧒 Lara</span>: <strong><span id="p1-pos">0</span> / 20</strong>
          </p>
          <p class="status-text pos-p2">
            <span id="p2-label">🧑 Amigo</span>: <strong><span id="p2-pos">0</span> / 20</strong>
          </p>
        </div>

        <div class="panel-card buttons-card">
          <button id="roll-btn" class="btn btn-primary">🎲 Jogar Dado</button>
          <button id="reset-btn" class="btn btn-secondary">🔄 Reiniciar</button>
        </div>

        <div class="panel-card history-card">
          <h2>📜 Jogadas</h2>
          <div id="history"></div>
        </div>
      </aside>
    </main>
  </div>

  <div id="debug-panel" class="hidden">
    <div class="debug-header">🐛 Debug</div>
    <button class="debug-btn" data-debug="casa11">Ir para casa 11</button>
    <button class="debug-btn" data-debug="entrar-floresta">Entrar na Floresta</button>
    <button class="debug-btn" data-debug="casa5-floresta">Ir para casa 5 da Floresta</button>
    <button class="debug-btn" data-debug="casa8-floresta">Ir para casa 8 da Floresta</button>
    <button class="debug-btn" data-debug="voltar-principal">Voltar ao mundo principal</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
