server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── HTML: sem cache (preview) ──
    location = / {
        try_files /index.html =404;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.html$ {
        try_files $uri =404;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── JS/CSS: revalida sempre, sem immutable ──
    location ~* \.(js|mjs|css)$ {
        try_files $uri =404;

        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    }

    # ── JSON/webmanifest: revalida sempre ──
    location ~* \.(json|webmanifest|map)$ {
        try_files $uri =404;

        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    }

    # ── Imagens, fontes e áudio: cache moderado (24h) ──
    location ~* \.(png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot|otf|webm|mp3|ogg|wav)$ {
        try_files $uri =404;

        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── Fallback: SPA ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
