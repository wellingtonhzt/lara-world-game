server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── HTML: sem cache (preview) ──
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # ── JS/CSS: revalida sempre, sem immutable ──
    location ~* \.(js|mjs|css)$ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        try_files $uri =404;
    }

    # ── JSON/webmanifest: revalida sempre ──
    location ~* \.(json|webmanifest)$ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        try_files $uri =404;
    }

    # ── Imagens, fontes e áudio: cache moderado ──
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot|otf|webm|mp3|ogg|wav)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
}
